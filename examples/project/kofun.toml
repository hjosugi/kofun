# A Kofun workspace. Run `kofun build` here to use frost-build's incremental
# engine. A standalone `kofun build main.kofun` never enters this path.
[workspace]
name = "demo"
default_targets = ["app", "bench"]

[toolchain]
kofunc = "kofun"

[target.app]
kind = "kofun_binary"
srcs = ["src/main.kofun"]

[target.bench]
kind = "kofun_binary"
srcs = ["src/bench.kofun"]
