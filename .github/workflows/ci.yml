name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    name: Python-free Kofun bootstrap
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: make verify
      - name: Build and run Kofun Core
        run: |
          ./bin/kofun build bootstrap/fixtures/answer.kofun -o build/answer
          test "$(./build/answer)" = "42"
